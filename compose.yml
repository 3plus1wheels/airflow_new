---
x-airflow-common: &airflow-common
  build:
    context: ./airflow_tsm
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__SCHEDULER__TASK_INSTANCE_HEARTBEAT_TIMEOUT: ${AIRFLOW_TASK_HEARTBEAT_TIMEOUT:-1800}
    AIRFLOW__EXECUTION_API__JWT_EXPIRATION_TIME: ${AIRFLOW_EXECUTION_API_JWT_EXPIRATION_TIME:-14400}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    MINIO_ENDPOINT: http://minio:9000
    FLOOD_MINIO_BUCKET: ${FLOOD_MINIO_BUCKET:-flood-results-full}
    INITIAL_WL_MINIO_BUCKET: ${INITIAL_WL_MINIO_BUCKET:-initial-wl}
    INITIAL_WL_MINIO_PREFIX: ${INITIAL_WL_MINIO_PREFIX:-dummy-files}
    MANHOLES_MINIO_BUCKET: ${MANHOLES_MINIO_BUCKET:-manholes-data}
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    AIRFLOW__CELERY__WORKER_CONCURRENCY: ${AIRFLOW_WORKER_CONCURRENCY:-1}
    MAX_WORKERS: ${MAX_WORKERS:-1}
    SAMPLE_RATE: ${SAMPLE_RATE:-1}
    MIN_DEPTH_THRESHOLD: ${MIN_DEPTH_THRESHOLD:-0}
    FLOOD_MAPPING_SCHEDULE: ${FLOOD_MAPPING_SCHEDULE:-*/30 * * * *}
    FLOOD_USE_DOWNLOADED_RESULTS: ${FLOOD_USE_DOWNLOADED_RESULTS:-false}
    LOCAL_GEOJSON_DIR: ${LOCAL_GEOJSON_DIR:-/opt/airflow/data/mapping/output_road_geojson}
    KEEP_LOCAL_GEOJSON: ${KEEP_LOCAL_GEOJSON:-false}
    SIMULATION_DURATION: ${SIMULATION_DURATION:-7200}
    UPDATE_INTERVAL: ${UPDATE_INTERVAL:-900}
    FLOOD_TEST_RAIN_MM_HR: ${FLOOD_TEST_RAIN_MM_HR:-}
    TOMORROW_API_KEY: ${TOMORROW_API_KEY:?Set TOMORROW_API_KEY in .env}
    THREEDI_API_KEY: ${THREEDI_API_KEY:?Set THREEDI_API_KEY in .env}
    MODEL_ID: ${MODEL_ID:-78600}
    ORG_UUID: ${ORG_UUID:?Set ORG_UUID in .env}
  volumes:
    - ./airflow_tsm/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./airflow_tsm/config:/opt/airflow/config
    - ./airflow_tsm/plugins:/opt/airflow/plugins
    - ./airflow_tsm/scripts:/opt/airflow/scripts
    - ./airflow_tsm/data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    airflow-redis:
      condition: service_healthy
    airflow-postgres:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      FLOOD_MINIO_BUCKET: ${FLOOD_MINIO_BUCKET:-flood-results-full}
      INITIAL_WL_MINIO_BUCKET: ${INITIAL_WL_MINIO_BUCKET:-initial-wl}
      MANHOLES_MINIO_BUCKET: ${MANHOLES_MINIO_BUCKET:-manholes-data}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb --ignore-existing "local/$${FLOOD_MINIO_BUCKET}"
        mc mb --ignore-existing "local/$${INITIAL_WL_MINIO_BUCKET}"
        mc mb --ignore-existing "local/$${MANHOLES_MINIO_BUCKET}"
        echo "MinIO buckets ready: $${FLOOD_MINIO_BUCKET}, $${INITIAL_WL_MINIO_BUCKET}, $${MANHOLES_MINIO_BUCKET}"

  storage-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minio_custom}
      POSTGRES_USER: ${POSTGRES_USER:-minio_custom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - storage-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  storage-backend:
    build:
      context: ./minio_custom/backend
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - ${GUNICORN_WORKERS:-2}
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,storage-backend}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DJANGO_USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST:-true}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${POSTGRES_DB:-minio_custom}
      DB_USER: ${POSTGRES_USER:-minio_custom}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DB_HOST: storage-postgres
      DB_PORT: 5432
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-720}
      JWT_REFRESH_TOKEN_DAYS: ${JWT_REFRESH_TOKEN_DAYS:-14}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:${MINIO_API_PORT:-9000}}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_SECURE: "false"
    depends_on:
      minio:
        condition: service_started
      storage-postgres:
        condition: service_healthy
    ports:
      - "${STORAGE_BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  storage-frontend:
    build:
      context: ./minio_custom/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      - storage-backend
    ports:
      - "${STORAGE_FRONTEND_PORT:-5173}:80"
    restart: unless-stopped

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: unless-stopped

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          export AIRFLOW_UID=$$(id -u)
        fi
        mkdir -v -p /opt/airflow/{logs,dags,scripts,plugins,config}
        /entrypoint airflow version
        mkdir -v -p /opt/airflow/{data,state}
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,scripts,plugins,config,data,state}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-trigger-flood-mapping:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        /entrypoint airflow dags unpause flood_mapping_full || true
        /entrypoint airflow dags trigger --run-id "startup__$$(date -u +%Y%m%dT%H%M%SZ)" flood_mapping_full || true
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-scheduler:
        condition: service_started
      airflow-worker:
        condition: service_started
    restart: "no"

  valhalla:
    image: ghcr.io/valhalla/valhalla:3.6.2
    command: ["valhalla_service", "/custom_files/valhalla.json", "2"]
    ports:
      - "${VALHALLA_PORT:-8002}:8002"
    volumes:
      - ./floodmap/valhalla-flood-road-test/valhalla/custom_files:/custom_files
      - ./floodmap/valhalla-flood-road-test/valhalla/custom_files/valhalla.json:/custom_files/valhalla.json:ro
    healthcheck:
      test: ["CMD", "bash", "-lc", "printf 'GET /status HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >/dev/tcp/127.0.0.1/8002"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  floodmap-backend:
    build:
      context: ./floodmap/valhalla-flood-road-test
      dockerfile: backend/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8010
      VALHALLA_URL: http://valhalla:8002
      FLOOD_MINIO_ENDPOINT: http://minio:9000
      FLOOD_MINIO_BUCKET: ${FLOOD_MINIO_BUCKET:-flood-results-full}
      FLOOD_MINIO_PREFIX: ${FLOOD_MINIO_PREFIX:-}
      FLOOD_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      FLOOD_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      FLOOD_LOCAL_FALLBACK: ${FLOOD_LOCAL_FALLBACK:-data/flood_road_20260522T103000.geojson}
    depends_on:
      valhalla:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${FLOODMAP_BACKEND_PORT:-8010}:8010"
    restart: unless-stopped

  floodmap-frontend:
    build:
      context: ./floodmap/valhalla-flood-road-test
      dockerfile: frontend/Dockerfile
    depends_on:
      - floodmap-backend
    ports:
      - "${FLOODMAP_FRONTEND_PORT:-8081}:80"
    restart: unless-stopped

volumes:
  airflow-postgres-data:
  airflow-logs:
  minio-data:
  storage-postgres-data:
